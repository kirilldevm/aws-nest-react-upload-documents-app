name: Frontend Deploy (Vercel)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-vercel-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Pull Vercel environment
        run: npx vercel@latest pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Vercel output
        run: npx vercel@latest build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prebuilt --prod --token="${VERCEL_TOKEN}"

